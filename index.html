  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const canvas =
        document.getElementById("scratchCanvas");

      const container =
        document.getElementById("js--sc--container");

      const backImage =
        document.getElementById("backImage");

      const ctx =
        canvas.getContext("2d");

      const dpr =
        window.devicePixelRatio || 1;

      canvas.width =
        container.clientWidth * dpr;

      canvas.height =
        container.clientHeight * dpr;

      let scratching = false;
      let fired = false;
      let lx = null;
      let ly = null;

      // BINGO WINNING LINE:
      // This is the full row of 5 blue squares.
      // Positions are normalised, so they scale with the phone size.
      const winningZones = [
        { cx: 0.179, cy: 0.604, rx: 0.060, ry: 0.036, cells: new Set(), done: false },
        { cx: 0.340, cy: 0.604, rx: 0.060, ry: 0.036, cells: new Set(), done: false },
        { cx: 0.500, cy: 0.604, rx: 0.060, ry: 0.036, cells: new Set(), done: false },
        { cx: 0.660, cy: 0.604, rx: 0.060, ry: 0.036, cells: new Set(), done: false },
        { cx: 0.821, cy: 0.604, rx: 0.060, ry: 0.036, cells: new Set(), done: false }
      ];

      const CELLS_NEEDED = 6;

      const winSound =
        new Audio("./sounds/win.mp3");

      winSound.preload = "auto";
      winSound.volume = 0.7;

      const revealVideoScreen =
        document.getElementById("revealVideoScreen");

      const continueButton =
        document.getElementById("continueButton");
let primed = false;

function primeAudio() {
  if (primed) return;

  primed = true;

  winSound.muted = true;

  winSound.play()
    .then(() => {
      winSound.pause();
      winSound.currentTime = 0;
      winSound.muted = false;
    })
    .catch(() => {});
}

      const front = new Image();
      front.src = "./images/front.jpeg";

      front.onload = () => {
        ctx.drawImage(
          front,
          0,
          0,
          canvas.width,
          canvas.height
        );

        backImage.style.visibility =
          "visible";

        ctx.globalCompositeOperation =
          "destination-out";

        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        canvas.addEventListener(
          "mousedown",
          start
        );

        canvas.addEventListener(
          "touchstart",
          start,
          { passive: false }
        );

        canvas.addEventListener(
          "mouseup",
          end
        );

        canvas.addEventListener(
          "mouseleave",
          end
        );

        canvas.addEventListener(
          "touchend",
          end
        );

        canvas.addEventListener(
          "touchcancel",
          end
        );
      };

    function start(e) {
      primeAudio();
  e.preventDefault();

        scratching = true;

        const pos = getPos(e);
        lx = pos.x;
        ly = pos.y;

        drawDot(lx, ly);
        trackWinningScratch(lx, ly);

        canvas.addEventListener(
          "mousemove",
          scratch
        );

        canvas.addEventListener(
          "touchmove",
          scratch,
          { passive: false }
        );
      }

      function end() {
        scratching = false;
        lx = null;
        ly = null;

        canvas.removeEventListener(
          "mousemove",
          scratch
        );

        canvas.removeEventListener(
          "touchmove",
          scratch
        );

        checkWin();
      }

      function getPos(e) {

  const rect =
    canvas.getBoundingClientRect();

  const touch =
    e.touches
      ? e.touches[0]
      : e;

  const scaleX =
    canvas.width / rect.width;

  const scaleY =
    canvas.height / rect.height;

  return {
    x:
      (touch.clientX - rect.left)
      * scaleX,

    y:
      (touch.clientY - rect.top)
      * scaleY
  };
}

      function scratch(e) {
        if (!scratching) return;

        e.preventDefault();

        const pos = getPos(e);
        const x = pos.x;
        const y = pos.y;

        ctx.lineWidth = 12 * dpr;

        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(x, y);
        ctx.stroke();

        trackLine(lx, ly, x, y);

        lx = x;
        ly = y;

        checkWin();
      }

      function drawDot(x, y) {
        ctx.beginPath();
        ctx.arc(
          x,
          y,
          6 * dpr,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      function trackLine(x1, y1, x2, y2) {
        const dist =
          Math.hypot(x2 - x1, y2 - y1);

        const steps =
          Math.max(
            1,
            Math.ceil(dist / (8 * dpr))
          );

        for (let i = 0; i <= steps; i++) {
          const x =
            x1 + ((x2 - x1) * i) / steps;

          const y =
            y1 + ((y2 - y1) * i) / steps;

          trackWinningScratch(x, y);
        }
      }

      function trackWinningScratch(px, py) {
        const nx = px / canvas.width;
        const ny = py / canvas.height;

        winningZones.forEach(zone => {
          if (zone.done) return;

          const dx =
            (nx - zone.cx) / zone.rx;

          const dy =
            (ny - zone.cy) / zone.ry;

          if (
            dx * dx + dy * dy > 1
          ) return;

          const localX =
            (nx - (zone.cx - zone.rx))
            / (zone.rx * 2);

          const localY =
            (ny - (zone.cy - zone.ry))
            / (zone.ry * 2);

          const gridX =
            Math.floor(localX * 5);

          const gridY =
            Math.floor(localY * 5);

          zone.cells.add(
            `${gridX}-${gridY}`
          );

          if (
            zone.cells.size >=
            CELLS_NEEDED
          ) {
            zone.done = true;
          }
        });
      }

      function checkWin() {
        if (fired) return;

        const won =
          winningZones.every(
            z => z.done
          );

        if (won) {
          fired = true;
          triggerWin();
        }
      }

continueButton.addEventListener("click", () => {
  const params = new URLSearchParams(window.location.search);
  const revealId = params.get("id");

  window.location.href = "details.html?id=" + revealId;
});
		
function triggerWin() {
        setTimeout(() => {

    // instruction text removed

       
            const confettiColors = [
  "#7EDCFF",
  "#4AB8F0",
  "#1E9FE0",
  "#BDEEFF",
  "#D9F6FF",
  "#FFFFFF",
          ];

          function confettiBurst(
            originY = 0.62,
            particleCount = 110,
            velocity = 60
          ) {
            confetti({
              particleCount,
              spread: 60,
              startVelocity: velocity,
              gravity: 1.1,
              ticks: 180,
              scalar: 0.95,
              drift:
                (Math.random() - 0.5)
                * 0.8,
              origin: {
                x: 0.5,
                y: originY
              },
              colors: confettiColors,
              shapes: ["circle", "square"]
            });
          }

          confettiBurst(0.62, 170, 68);

          setTimeout(() => {
            confettiBurst(0.60, 120, 58);
          }, 220);

          setTimeout(() => {
            confettiBurst(0.64, 95, 50);
          }, 520);

          setTimeout(() => {
            confettiBurst(0.58, 70, 42);
          }, 850);

          winSound.currentTime = 0;
          winSound.play().catch(() => {});

          setTimeout(() => {
            revealVideoScreen.classList.add("show");

            setTimeout(() => {
              revealVideoScreen.classList.add("ready");
            }, 1400);
          }, 4000);

        }, 1000);
      }

    });
  </script>
